<!DOCTYPE html>
<html>
<head>
    <title>Sudoku Solver</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        .container {
            background: white;
            color: black;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        input {
            margin: 20px 0;
        }

        button {
            background: #2a5298;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }
    </style>
</head>

<body>

    <h1>Rishabh Kumar - The Sudoku Champ</h1>

    <div class="container">
        <h3>Upload Sudoku Image</h3>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" required>
            <br>
            <button type="submit">Solve Sudoku</button>
        </form>
    </div>

</body>
</html>
